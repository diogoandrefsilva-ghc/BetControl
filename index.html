<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0c1611">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Banca</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1611; --bg2:#0a120e;
  --surf:#15231b; --surf2:#1b2c22; --line:#2a3c31;
  --ivory:#ECE6D8; --muted:#8FA396; --faint:#64776c;
  --brass:#C9A227; --brass-dim:#9c7e1f;
  --pos:#46c266; --neg:#e5574c;
  --r:18px;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(120% 80% at 50% -10%,#13241b 0%,var(--bg) 45%,var(--bg2) 100%) fixed;
  color:var(--ivory); font-family:Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
  caret-color:transparent; overscroll-behavior-y:contain;
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;caret-color:transparent}
input,select{font-family:inherit}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.disp{font-family:'Space Grotesk',sans-serif}
.eyebrow{font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:11px;font-weight:600;color:var(--faint)}

/* ===== pull to refresh ===== */
#ptr{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;
  height:0;overflow:hidden;z-index:60;pointer-events:none;transition:height .18s ease}
#ptr .spin{width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--brass);
  border-radius:50%;margin-bottom:10px;opacity:.0;transition:opacity .15s}
#ptr.pull .spin{opacity:1}
#ptr.go .spin{animation:sp .7s linear infinite;opacity:1}
@keyframes sp{to{transform:rotate(360deg)}}

/* ===== layout ===== */
.wrap{max-width:560px;margin:0 auto;padding:0 16px calc(120px + var(--safe-b))}
header{position:sticky;top:0;z-index:40;
  padding:calc(var(--safe-t) + 12px) 16px 10px;
  background:linear-gradient(var(--bg) 70%,transparent);
  backdrop-filter:blur(6px)}
.hbar{max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:9px}
.chip-suit{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(150deg,#1d2f24,#101b14);border:1px solid var(--line);color:var(--brass);font-size:15px}
.brand h1{font-family:'Space Grotesk';font-size:20px;font-weight:700;margin:0;letter-spacing:-.01em}
.brand small{display:block;color:var(--faint);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;margin-top:-2px}
.acct{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--surf);
  display:grid;place-items:center;font-size:13px;color:var(--muted);overflow:hidden}
.acct img{width:100%;height:100%;object-fit:cover}

/* season tabs */
.seasons{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px;-ms-overflow-style:none;scrollbar-width:none}
.seasons::-webkit-scrollbar{display:none}
.stab{white-space:nowrap;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;
  background:var(--surf);border:1px solid var(--line);color:var(--muted);transition:.15s;font-family:'Space Grotesk'}
.stab.on{background:var(--brass);border-color:var(--brass);color:#1a1305}

/* hero */
.hero{margin:14px 0 8px;background:linear-gradient(160deg,var(--surf2),var(--surf));
  border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 100% 0,rgba(201,162,39,.10),transparent 60%);pointer-events:none}
.hero .lbl{display:flex;justify-content:space-between;align-items:baseline}
.hero .lbl span{color:var(--muted);font-size:12.5px}
.big{font-family:'Space Grotesk';font-weight:700;font-size:42px;line-height:1.05;margin:6px 0 2px;letter-spacing:-.02em}
.big.pos{color:var(--pos)} .big.neg{color:var(--neg)}
.sub{color:var(--faint);font-size:12px;margin-bottom:14px}
.flow{height:9px;border-radius:6px;background:#0e1813;display:flex;overflow:hidden;border:1px solid var(--line)}
.flow i{display:block;height:100%}
.flow .out{background:linear-gradient(90deg,#7a4a44,var(--neg))}
.flow .in{background:linear-gradient(90deg,var(--pos),#2e8c47)}
.legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.legend div{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.legend b{font-family:'IBM Plex Mono';font-weight:600;color:var(--ivory);font-variant-numeric:tabular-nums}
.dot{width:8px;height:8px;border-radius:50%}
.dot.o{background:var(--neg)} .dot.i{background:var(--pos)} .dot.s{background:var(--brass)}

/* section title */
.sect{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 11px}
.sect .eyebrow{color:var(--muted)}
.sect button.link{color:var(--brass);font-size:12.5px;font-weight:600}

/* casa cards */
.casas{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.casa{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:13px;min-width:0;transition:.15s}
.casa:active{transform:scale(.985)}
.casa .top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.casa .top .cdot{width:10px;height:10px;border-radius:3px;flex:none}
.casa .top h3{font-size:13.5px;font-weight:600;margin:0;font-family:'Space Grotesk';overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.casa .rl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1px}
.casa .res{font-family:'Space Grotesk';font-weight:700;font-size:21px;letter-spacing:-.01em}
.casa .res.pos{color:var(--pos)} .casa .res.neg{color:var(--neg)} .casa .res.z{color:var(--muted)}
.casa .cfoot{display:flex;gap:12px;margin-top:9px;font-family:'IBM Plex Mono';font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.casa .cfoot .o::before{content:"↑ ";color:var(--neg)}
.casa .cfoot .i::before{content:"↓ ";color:var(--pos)}
.casa .salchip{display:block;width:100%;margin-top:11px;padding:8px 10px;border-radius:10px;
  background:#0e1813;border:1px solid var(--line);text-align:center;
  font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.casa .salchip b{font-family:'IBM Plex Mono';font-weight:600;color:var(--brass);margin-left:5px}
.casa .salchip b.empty{color:var(--faint);font-weight:400;font-family:Inter}

/* movimentos */
.month{margin-top:18px}
.month .mh{display:flex;justify-content:space-between;align-items:baseline;margin:0 2px 8px}
.month .mh .mtitle{font-family:'Space Grotesk';font-weight:600;font-size:14px;text-transform:capitalize}
.month .mh .mtot{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.mov{display:flex;align-items:center;gap:11px;background:var(--surf);border:1px solid var(--line);
  border-radius:13px;padding:11px 13px;margin-bottom:7px;transition:.12s}
.mov:active{background:var(--surf2)}
.mov .ic{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:15px;
  background:#0e1813;border:1px solid var(--line)}
.mov .ic.dep{color:var(--neg)} .mov .ic.lev{color:var(--pos)}
.mov .mid{flex:1;min-width:0}
.mov .mid .l1{display:flex;align-items:center;gap:7px}
.mov .mid .cn{font-size:13.5px;font-weight:600}
.mov .mid .cc{width:7px;height:7px;border-radius:2px;flex:none}
.mov .mid .l2{font-size:11px;color:var(--faint);margin-top:1px}
.mov .amt{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;white-space:nowrap}
.mov .amt.dep{color:var(--ivory)} .mov .amt.lev{color:var(--pos)}

.empty{text-align:center;color:var(--faint);padding:40px 20px;font-size:13.5px}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(20px + var(--safe-b));z-index:45;
  width:58px;height:58px;border-radius:19px;background:linear-gradient(150deg,var(--brass),var(--brass-dim));
  color:#1a1305;display:grid;place-items:center;font-size:28px;font-weight:300;
  box-shadow:0 10px 26px rgba(201,162,39,.34),0 2px 6px rgba(0,0,0,.4);transition:.15s}
.fab:active{transform:scale(.92)}

/* sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(4,8,6,.62);backdrop-filter:blur(3px);z-index:80;
  opacity:0;pointer-events:none;transition:.2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:81;background:var(--surf);
  border-top:1px solid var(--line);border-radius:24px 24px 0 0;padding:8px 18px calc(22px + var(--safe-b));
  transform:translateY(102%);transition:transform .26s cubic-bezier(.2,.8,.2,1);max-width:560px;margin:0 auto}
.sheet.on{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.sheet h2{font-family:'Space Grotesk';font-size:18px;font-weight:700;margin:0 0 16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.02em}
.field input,.field select{width:100%;background:#0e1813;border:1px solid var(--line);border-radius:12px;
  color:var(--ivory);font-size:15.5px;padding:13px 13px;caret-color:var(--brass);
  -webkit-appearance:none;appearance:none;min-width:0;max-width:100%;box-sizing:border-box}
.field input:focus,.field select:focus{outline:none;border-color:var(--brass)}
.row2{display:flex;gap:10px}.row2 .field{flex:1;min-width:0}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:12px;border-radius:12px;background:#0e1813;border:1px solid var(--line);
  font-weight:600;font-size:13.5px;color:var(--muted);font-family:'Space Grotesk'}
.seg button.on.dep{background:rgba(229,87,76,.16);border-color:var(--neg);color:#f2a097}
.seg button.on.lev{background:rgba(70,194,102,.16);border-color:var(--pos);color:#8fe0a3}
.casaPick{display:flex;flex-wrap:wrap;gap:8px}
.casaPick button{padding:9px 13px;border-radius:999px;background:#0e1813;border:1px solid var(--line);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.casaPick button .cd{width:9px;height:9px;border-radius:3px}
.casaPick button.on{border-color:var(--brass);background:rgba(201,162,39,.12);color:var(--ivory)}
.btnP{width:100%;padding:15px;border-radius:14px;background:linear-gradient(150deg,var(--brass),var(--brass-dim));
  color:#1a1305;font-weight:700;font-size:15px;font-family:'Space Grotesk';margin-top:6px}
.btnP:active{filter:brightness(.95)}
.btnGhost{width:100%;padding:13px;border-radius:13px;background:transparent;border:1px solid var(--line);
  color:var(--muted);font-weight:500;font-size:13.5px;margin-top:9px}
.btnDel{color:var(--neg);border-color:rgba(229,87,76,.4)}

/* login */
.login{min-height:100vh;display:grid;place-items:center;padding:30px}
.login .card{text-align:center;max-width:340px}
.login .chip-suit{width:62px;height:62px;border-radius:18px;font-size:30px;margin:0 auto 20px}
.login h1{font-family:'Space Grotesk';font-size:28px;margin:0 0 8px}
.login p{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 26px}
.gbtn{display:inline-flex;align-items:center;gap:11px;background:#fff;color:#1a1a1a;font-weight:600;
  font-size:15px;padding:13px 22px;border-radius:14px}
.note{margin-top:22px;font-size:12px;color:var(--faint);line-height:1.5}

.toast{position:fixed;left:50%;bottom:calc(94px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:#1d2c23;border:1px solid var(--line);color:var(--ivory);padding:11px 18px;border-radius:12px;
  font-size:13.5px;z-index:90;opacity:0;transition:.2s;pointer-events:none;box-shadow:0 8px 22px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.demoBadge{display:inline-block;margin-left:8px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--brass);border:1px solid var(--brass-dim);border-radius:6px;padding:2px 6px;vertical-align:middle;font-family:'Space Grotesk';font-weight:600}
</style>
</head>

/* ---------- estado ---------- */
const S = { casas:[], movs:[], season:'all', filterCasa:null, user:null, demo:!CFG.SB_ANON, editId:null };
const eur = n => new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR'}).format(n||0);
const eur0 = n => new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const $ = s => document.querySelector(s);
const MESES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MESESL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ---------- época ---------- */
function epocaDe(dateStr){
  const d=new Date(dateStr+'T00:00:00'); const y=d.getFullYear();
  const after=(d.getMonth()+1>CFG.SEASON_START.m)||(d.getMonth()+1===CFG.SEASON_START.m&&d.getDate()>=CFG.SEASON_START.d);
  const ini=after?y:y-1; return ini+'/'+String(ini+1).slice(2);
}
function epocasDisponiveis(){
  const set=new Set(S.movs.map(m=>epocaDe(m.data)));
  return [...set].sort();
}

/* ---------- supabase ---------- */
let _tok=null,_exp=0;
async function sbAuthHeader(){
  if(S.demo) return {};
  if(_tok && Date.now()<_exp-60000) return {Authorization:'Bearer '+_tok};
  // tenta refrescar a partir da sessão guardada na URL/hash (fluxo simples)
  return _tok?{Authorization:'Bearer '+_tok}:{};
}
async function sb(path, {method='GET',body=null,write=false}={}){
  const h={apikey:CFG.SB_ANON,'Content-Type':'application/json'};
  Object.assign(h, await sbAuthHeader());
  h[write?'Content-Profile':'Accept-Profile']=CFG.SCHEMA;
  if(method!=='GET'&&!write) h['Accept-Profile']=CFG.SCHEMA;
  if(write) h['Prefer']='return=representation';
  const r=await fetch(CFG.SB_URL+'/rest/v1/'+path,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){const t=await r.text();throw new Error(r.status+' '+t)}
  const txt=await r.text(); return txt?JSON.parse(txt):null;
}

/* ---------- carregar ---------- */
async function load(){
  if(S.demo){
    if(!S.casas.length){ S.casas=structuredClone(SEED.casas); S.movs=structuredClone(SEED.movimentos); }
    return;
  }
  const [casas,movs]=await Promise.all([
    sb('casas?select=*&order=ordem'),
    sb('movimentos?select=*&order=data.desc,id.desc')
  ]);
  S.casas=casas||[]; S.movs=movs||[];
}

/* ---------- cálculos ---------- */
function movsFiltrados(){
  let m=S.movs;
  if(S.season!=='all') m=m.filter(x=>epocaDe(x.data)===S.season);
  if(S.filterCasa) m=m.filter(x=>x.casa===S.filterCasa);
  return m;
}
function totais(list){
  let dep=0,lev=0;
  list.forEach(m=>{ if(m.tipo==='deposito')dep+=+m.valor; else lev+=+m.valor; });
  return {dep,lev};
}
function saldoTotal(){ return S.casas.reduce((a,c)=>a+(+c.saldo||0),0); }
function casaStats(nome,season){
  let list=S.movs.filter(m=>m.casa===nome);
  if(season!=='all') list=list.filter(m=>epocaDe(m.data)===season);
  const {dep,lev}=totais(list);
  const casa=S.casas.find(c=>c.nome===nome);
  const saldo=+(casa?.saldo||0);
  return {dep,lev,saldo,resultado:lev+saldo-dep,nMov:list.length};
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  if(!S.demo && !S.user){ renderLogin(); return; }
  const list=movsFiltrados();
  const {dep,lev}=totais(list);
  const saldo=saldoTotal();
  const isAll=S.season==='all';
  // resultado: com época específica mostramos fluxo (lev-dep); em "todas" incluímos saldo atual
  const resultado = isAll ? (lev+saldo-dep) : (lev-dep);
  const resLabel = isAll ? 'Resultado' : 'Fluxo da época';
  const resCls = resultado>0.005?'pos':(resultado<-0.005?'neg':'');
  const denom=Math.max(dep,lev+ (isAll?saldo:0),1);
  const outW=Math.min(100,dep/denom*100), inW=Math.min(100,(lev+(isAll?saldo:0))/denom*100);

  const seasons=epocasDisponiveis();
  const tabs=['all',...seasons].map(s=>`<button class="stab ${S.season===s?'on':''}" onclick="setSeason('${s}')">${s==='all'?'Todas':s}</button>`).join('');

  // casas
  const casasH=S.casas.filter(c=>c.ativa!==false).map(c=>{
    const st=casaStats(c.nome,S.season);
    const rc=st.resultado>0.005?'pos':(st.resultado<-0.005?'neg':'z');
    const active=S.filterCasa===c.nome;
    const sign=st.resultado>-0.005?'+':'−';
    return `<div class="casa" style="${active?'border-color:'+c.cor:''}" onclick="toggleCasa('${esc(c.nome)}')">
      <div class="top"><span class="cdot" style="background:${c.cor}"></span><h3>${esc(c.nome)}</h3></div>
      <div class="rl">Resultado</div>
      <div class="res ${rc}">${sign}${eur0(Math.abs(st.resultado))}</div>
      <div class="cfoot"><span class="o">${eur0(st.dep)}</span><span class="i">${eur0(st.lev)}</span></div>
      <button class="salchip" onclick="event.stopPropagation();editSaldo('${esc(c.nome)}')">
        Saldo<b class="${(+c.saldo)?'':'empty'}">${(+c.saldo)?eur0(c.saldo):'definir'}</b></button>
    </div>`;
  }).join('');

  // movimentos agrupados por mês
  let movH='';
  if(list.length===0){
    movH=`<div class="empty">Sem movimentos ${S.filterCasa?'em '+esc(S.filterCasa):'nesta época'}.<br>Toca no + para registar.</div>`;
  }else{
    const groups={};
    list.forEach(m=>{const k=m.data.slice(0,7);(groups[k]??=[]).push(m)});
    movH=Object.keys(groups).sort().reverse().map(k=>{
      const [y,mo]=k.split('-'); const items=groups[k];
      const {dep:gd,lev:gl}=totais(items);
      const rows=items.map(m=>{
        const c=S.casas.find(x=>x.nome===m.casa)||{cor:'#888'};
        const dep=m.tipo==='deposito';
        const dia=new Date(m.data+'T00:00:00').getDate();
        return `<div class="mov" onclick="editMov(${m.id})">
          <div class="ic ${dep?'dep':'lev'}">${dep?'↑':'↓'}</div>
          <div class="mid">
            <div class="l1"><span class="cc" style="background:${c.cor}"></span><span class="cn">${esc(m.casa)}</span></div>
            <div class="l2">${dia} ${MESESL[+mo-1]} · ${dep?'Depósito':'Levantamento'}${m.nota?' · '+esc(m.nota):''}</div>
          </div>
          <div class="amt ${dep?'dep':'lev'}">${dep?'−':'+'}${eur0(m.valor)}</div>
        </div>`;
      }).join('');
      const net=gl-gd;
      return `<div class="month">
        <div class="mh"><span class="mtitle">${MESESL[+mo-1]} ${y}</span>
          <span class="mtot">${net>=0?'+':'−'}${eur0(Math.abs(net))}</span></div>
        ${rows}</div>`;
    }).join('');
  }

  const init = S.user?.email ? S.user.email[0].toUpperCase() : BALL;
  const avatar = S.user?.avatar ? `<img src="${S.user.avatar}">` : init;

  $('#app').innerHTML=`
  <header>
    <div class="hbar">
      <div class="brand">
        <div class="chip-suit">${BALL}</div>
        <div><h1>Banca${S.demo?'<span class="demoBadge">demo</span>':''}</h1><small>Caderneta de apostas</small></div>
      </div>
      <button class="acct" onclick="acctMenu()">${avatar}</button>
    </div>
    <div class="seasons">${tabs}</div>
  </header>
  <div class="wrap">
    <div class="hero">
      <div class="lbl"><span>${resLabel}${S.season==='all'?'':' · '+S.season}</span>
        <span class="mono" style="color:var(--brass)">${list.length} mov.</span></div>
      <div class="big ${resCls}">${resultado>=0?'+':'−'}${eur(Math.abs(resultado)).replace('-','')}</div>
      <div class="sub">${isAll?'Levantamentos + saldo atual − depósitos':'Levantamentos − depósitos nesta época'}</div>
      <div class="flow"><i class="out" style="width:${outW}%"></i><i class="in" style="width:${inW}%"></i></div>
      <div class="legend">
        <div><span class="dot o"></span>Depositado <b>${eur0(dep)}</b></div>
        <div><span class="dot i"></span>Levantado <b>${eur0(lev)}</b></div>
        ${isAll?`<div><span class="dot s"></span>Saldo atual <b>${eur0(saldo)}</b></div>`:''}
      </div>
    </div>

    <div class="sect"><span class="eyebrow">Por casa</span>
      ${S.filterCasa?`<button class="link" onclick="toggleCasa(null)">Ver todas ✕</button>`:`<button class="link" onclick="gerirCasas()">Gerir</button>`}
    </div>
    <div class="casas">${casasH}</div>

    <div class="sect"><span class="eyebrow">Movimentos${S.filterCasa?' · '+esc(S.filterCasa):''}</span></div>
    ${movH}
  </div>
  <button class="fab" onclick="novoMov()">+</button>`;
}

/* ---------- ações UI ---------- */
function esc(s){return String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]))}
function setSeason(s){S.season=s;render()}
function toggleCasa(n){S.filterCasa=(S.filterCasa===n)?null:n;render()}
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2000)}
function openSheet(html){$('#sheet').innerHTML='<div class="grab"></div>'+html;$('#scrim').classList.add('on');$('#sheet').classList.add('on')}
function closeSheet(){$('#scrim').classList.remove('on');$('#sheet').classList.remove('on');S.editId=null}

/* ----- novo / editar movimento ----- */
let form={};
function novoMov(){
  form={data:new Date().toISOString().slice(0,10),casa:S.filterCasa||S.casas[0]?.nome,tipo:'deposito',valor:'',nota:''};

}

  const m=S.movs.find(x=>x.id===id); if(!m)return;

  S.editId=id; renderForm('Editar movimento');
}

  openSheet(`<h2>${title}</h2>
    <div class="field"><label>Casa</label><div class="casaPick">${casasPick}</div></div>
    <div class="field"><label>Tipo</label><div class="seg">
      <button class="${form.tipo==='deposito'?'on dep':''}" onclick="form.tipo='deposito';renderForm('${title}')">↑ Depósito</button>
      <button class="${form.tipo==='levantamento'?'on lev':''}" onclick="form.tipo='levantamento';renderForm('${title}')">↓ Levantamento</button>
    </div></div>
    <div class="row2">
      <div class="field"><label>Valor (€)</label><input id="f_valor" type="number" inputmode="decimal" step="0.01" min="0" value="${form.valor}" placeholder="0,00"></div>
      <div class="field"><label>Data</label><input id="f_data" type="date" value="${form.data}"></div>
    </div>
    <div class="field"><label>Nota (opcional)</label><input id="f_nota" type="text" value="${esc(form.nota||'')}" placeholder="ex: bónus, multipla…"></div>
    <button class="btnP" onclick="saveMov()">Guardar</button>
    ${S.editId?`<button class="btnGhost btnDel" onclick="delMov()">Eliminar movimento</button>`:''}
    <button class="btnGhost" onclick="closeSheet()">Cancelar</button>`);
  setTimeout(()=>{if(!form.valor)$('#f_valor')?.focus()},250);
}
async function saveMov(){
  const valor=parseFloat($('#f_valor').value.replace(',','.'));
  const data=$('#f_data').value, nota=$('#f_nota').value.trim();
  if(!form.casa) return toast('Escolhe a casa');
  if(!(valor>0)) return toast('Valor inválido');
  if(!data) return toast('Falta a data');
  const rec={data,casa:form.casa,tipo:form.tipo,valor:Math.round(valor*100)/100,nota:nota||null};
  try{
    if(S.editId){
      if(S.demo){Object.assign(S.movs.find(m=>m.id===S.editId),rec)}
      else await sb('movimentos?id=eq.'+S.editId,{method:'PATCH',body:rec,write:true});
      toast('Movimento atualizado');
    }else{
      const id=nextId();
      if(S.demo){S.movs.push({id,...rec})}
      else await sb('movimentos',{method:'POST',body:{id,...rec},write:true});
      toast('Movimento registado');
    }
    if(!S.demo) await load();
    closeSheet(); render();
  }catch(e){toast('Erro: '+e.message)}
}
function nextId(){return (S.movs.reduce((a,m)=>Math.max(a,m.id),0)||0)+1}
async function delMov(){
  if(!confirm('Eliminar este movimento?'))return;
  try{
    if(S.demo){S.movs=S.movs.filter(m=>m.id!==S.editId)}
    else await sb('movimentos?id=eq.'+S.editId,{method:'DELETE',write:true});
    toast('Eliminado'); closeSheet(); if(!S.demo)await load(); render();
  }catch(e){toast('Erro: '+e.message)}
}

/* ----- saldo por casa ----- */
function editSaldo(nome){
  const c=S.casas.find(x=>x.nome===nome);
  openSheet(`<h2>Saldo atual · ${esc(nome)}</h2>
    <p style="color:var(--muted);font-size:13px;margin:-6px 0 16px">Quanto tens neste momento nesta casa. Entra no cálculo do resultado real.</p>
    <div class="field"><label>Saldo (€)</label><input id="f_saldo" type="number" inputmode="decimal" step="0.01" min="0" value="${+c.saldo||''}" placeholder="0,00"></div>
    <button class="btnP" onclick="saveSaldo('${esc(nome)}')">Guardar saldo</button>
    <button class="btnGhost" onclick="closeSheet()">Cancelar</button>`);
  setTimeout(()=>$('#f_saldo')?.focus(),250);
}
async function saveSaldo(nome){
  const v=parseFloat(($('#f_saldo').value||'0').replace(',','.'))||0;
  const body={saldo:Math.round(v*100)/100,saldo_em:new Date().toISOString()};
  try{
    if(S.demo){Object.assign(S.casas.find(c=>c.nome===nome),body)}
    else await sb('casas?nome=eq.'+encodeURIComponent(nome),{method:'PATCH',body,write:true});
    toast('Saldo atualizado'); closeSheet(); if(!S.demo)await load(); render();
  }catch(e){toast('Erro: '+e.message)}
}

/* ----- gerir casas ----- */
function gerirCasas(){
  const rows=S.casas.map(c=>`<div class="mov">
    <div class="ic" style="color:${c.cor}">●</div>
    <div class="mid"><div class="cn">${esc(c.nome)}</div><div class="l2">${casaStats(c.nome,'all').nMov} movimentos</div></div>
    <input type="color" value="${c.cor}" style="width:34px;height:34px;border:none;background:none;padding:0" onchange="setCor('${esc(c.nome)}',this.value)">
  </div>`).join('');
  openSheet(`<h2>Casas</h2>${rows}
    <div class="field" style="margin-top:14px"><label>Adicionar casa</label><input id="f_casa" type="text" placeholder="Nome da casa"></div>
    <button class="btnP" onclick="addCasa()">Adicionar</button>
    <button class="btnGhost" onclick="closeSheet()">Fechar</button>`);
}
async function setCor(nome,cor){
  if(S.demo){S.casas.find(c=>c.nome===nome).cor=cor}
  else{try{await sb('casas?nome=eq.'+encodeURIComponent(nome),{method:'PATCH',body:{cor},write:true})}catch(e){}}
}
async function addCasa(){
  const nome=$('#f_casa').value.trim(); if(!nome)return toast('Falta o nome');
  if(S.casas.some(c=>c.nome===nome))return toast('Já existe');
  const rec={nome,cor:'#8A93A6',ordem:(S.casas.reduce((a,c)=>Math.max(a,c.ordem||0),0))+1,ativa:true,saldo:0};
  try{
    if(S.demo){S.casas.push(rec)}
    else await sb('casas',{method:'POST',body:rec,write:true});
    toast('Casa adicionada'); closeSheet(); if(!S.demo)await load(); render();
  }catch(e){toast('Erro: '+e.message)}
}

/* ----- conta ----- */
function acctMenu(){
  openSheet(`<h2>Conta</h2>
    <p style="color:var(--muted);font-size:13.5px;margin:-6px 0 14px">
      ${S.demo?'Modo demo — dados embebidos, alterações não são guardadas. Mete a anon key no CFG para ligar ao Supabase.':esc(S.user?.email||'')}</p>
    ${S.demo?'':`<button class="btnGhost" onclick="logout()">Terminar sessão</button>`}
    <button class="btnGhost" onclick="closeSheet()">Fechar</button>`);
}

/* ---------- auth (Google via Supabase) ---------- */
function googleLogin(){
  const redirect=location.origin+location.pathname;
  location.href=`${CFG.SB_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirect)}`;
}
function logout(){_tok=null;_exp=0;S.user=null;location.hash='';closeSheet();render()}
function parseAuthHash(){
  if(!location.hash.includes('access_token'))return false;
  const p=new URLSearchParams(location.hash.slice(1));
  _tok=p.get('access_token'); _exp=Date.now()+(+p.get('expires_in')||3600)*1000;
  history.replaceState(null,'',location.pathname);
  return true;
}
async function fetchUser(){
  try{
    const r=await fetch(CFG.SB_URL+'/auth/v1/user',{headers:{apikey:CFG.SB_ANON,Authorization:'Bearer '+_tok}});
    const u=await r.json();
    if(u.email!==CFG.ADMIN_EMAIL){alert('Sem acesso a esta conta.');logout();return;}
    S.user={email:u.email,avatar:u.user_metadata?.avatar_url};
  }catch(e){_tok=null}
}

/* ---------- pull to refresh ---------- */
let startY=0,pulling=false;
addEventListener('touchstart',e=>{if(scrollY<=0){startY=e.touches[0].clientY;pulling=true}},{passive:true});
addEventListener('touchmove',e=>{
  if(!pulling)return; const dy=e.touches[0].clientY-startY;
  if(dy>0&&scrollY<=0){const h=Math.min(dy*.5,70);$('#ptr').style.height=h+'px';$('#ptr').classList.toggle('pull',h>10)}
},{passive:true});
addEventListener('touchend',async()=>{
  if(!pulling)return; pulling=false; const ptr=$('#ptr');
  if(parseInt(ptr.style.height)>45){ptr.classList.add('go');ptr.style.height='44px';
    try{await load()}catch(e){} render(); setTimeout(()=>{ptr.classList.remove('go','pull');ptr.style.height='0'},400);
  }else{ptr.classList.remove('pull');ptr.style.height='0'}
});

/* ---------- arranque ---------- */
(async function init(){
  if(!S.demo){
    if(parseAuthHash()) await fetchUser();
    else { renderLogin(); /* sem token guardado, pede login */ }
  }
  try{ if(S.demo||S.user) await load(); }catch(e){ console.error(e); }
  render();
})();

/* ---------- service worker ---------- */
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
