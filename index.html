<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f3f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Controlo de Apostas</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3f0e8; --bg2:#ece7db;
  --surf:#ffffff; --surf2:#f8f5ec; --line:#e3ddcd;
  --inset:#f4f0e6;
  --ivory:#23302a; --muted:#5f7268; --faint:#9aa89f;
  --brass:#b08714; --brass-dim:#977414;
  --pos:#1f9d57; --neg:#d8453b;
  --r:18px;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(120% 80% at 50% -10%,#fbfaf4 0%,var(--bg) 45%,var(--bg2) 100%) fixed;
  color:var(--ivory); font-family:Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
  caret-color:transparent; overscroll-behavior-y:contain;
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;caret-color:transparent}
input,select{font-family:inherit}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.disp{font-family:'Space Grotesk',sans-serif}
.eyebrow{font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:11px;font-weight:600;color:var(--faint)}

/* ===== pull to refresh ===== */
#ptr{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;
  height:0;overflow:hidden;z-index:60;pointer-events:none;transition:height .18s ease}
#ptr .spin{width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--brass);
  border-radius:50%;margin-bottom:10px;opacity:.0;transition:opacity .15s}
#ptr.pull .spin{opacity:1}
#ptr.go .spin{animation:sp .7s linear infinite;opacity:1}
@keyframes sp{to{transform:rotate(360deg)}}

/* ===== layout ===== */
.wrap{max-width:560px;margin:0 auto;padding:0 16px calc(120px + var(--safe-b))}
header{position:sticky;top:0;z-index:40;
  padding:calc(var(--safe-t) + 12px) 16px 10px;
  background:linear-gradient(var(--bg) 70%,transparent);
  backdrop-filter:blur(6px)}
.hbar{max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:9px}
.chip-suit{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(150deg,#16c172,#0d9488);border:1px solid rgba(255,255,255,.16);color:#F7D85B;font-size:15px;
  box-shadow:0 2px 10px rgba(13,148,136,.35)}
.brand h1{font-family:'Space Grotesk';font-size:17px;font-weight:700;margin:0;letter-spacing:-.01em;white-space:nowrap}
.brand small{display:block;color:var(--faint);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;margin-top:-2px}
.acct{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--surf);
  display:grid;place-items:center;font-size:13px;color:var(--muted);overflow:hidden}
.acct img{width:100%;height:100%;object-fit:cover}

/* season tabs */
.seasons{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px;-ms-overflow-style:none;scrollbar-width:none}
.seasons::-webkit-scrollbar{display:none}
.stab{white-space:nowrap;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;
  background:var(--surf);border:1px solid var(--line);color:var(--muted);transition:.15s;font-family:'Space Grotesk'}
.stab.on{background:var(--brass);border-color:var(--brass);color:#1a1305}

/* hero */
.hero{margin:14px 0 8px;background:linear-gradient(160deg,#ffffff,var(--surf2));
  border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;position:relative;overflow:hidden;
  box-shadow:0 1px 2px rgba(40,50,45,.04),0 10px 30px rgba(40,50,45,.07)}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 100% 0,rgba(176,135,20,.12),transparent 60%);pointer-events:none}
.hero::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--brass),#d8b54a,var(--brass))}
.hero .lbl{display:flex;justify-content:space-between;align-items:baseline}
.hero .lbl span{color:var(--muted);font-size:12.5px}
.big{font-family:'Space Grotesk';font-weight:700;font-size:42px;line-height:1.05;margin:6px 0 2px;letter-spacing:-.02em}
.big.pos{color:var(--pos)} .big.neg{color:var(--neg)}
.sub{color:var(--faint);font-size:12px;margin-bottom:14px}
.flow{height:9px;border-radius:6px;background:var(--inset);display:flex;overflow:hidden;border:1px solid var(--line)}
.flow i{display:block;height:100%}
.flow .out{background:linear-gradient(90deg,#7a4a44,var(--neg))}
.flow .in{background:linear-gradient(90deg,var(--pos),#2e8c47)}
.legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.legend div{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.legend b{font-family:'IBM Plex Mono';font-weight:600;color:var(--ivory);font-variant-numeric:tabular-nums}
.dot{width:8px;height:8px;border-radius:50%}
.dot.o{background:var(--neg)} .dot.i{background:var(--pos)} .dot.s{background:var(--brass)}

/* section title */
.sect{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 11px}
.sect .eyebrow{color:var(--muted)}
.sect button.link{color:var(--brass);font-size:12.5px;font-weight:600}

/* view switch (Totais / Movimentos) */
.vtabs{display:flex;gap:5px;background:var(--surf2);border:1px solid var(--line);border-radius:15px;
  padding:5px;margin:16px 0 2px;box-shadow:inset 0 1px 2px rgba(40,50,45,.04)}
.vtabs button{flex:1;padding:11px;border-radius:11px;font-weight:600;font-size:13.5px;color:var(--muted);
  font-family:'Space Grotesk';letter-spacing:.01em;transition:.15s}
.vtabs button.on{background:#fff;color:var(--ivory);box-shadow:0 1px 2px rgba(40,50,45,.06),0 4px 12px rgba(40,50,45,.08)}

/* sub-tabs dentro de Totais */
.subtabs{display:flex;gap:8px;margin:16px 2px 13px}
.subtabs button{padding:8px 15px;border-radius:999px;font-size:12.5px;font-weight:600;background:var(--surf);
  border:1px solid var(--line);color:var(--muted);font-family:'Space Grotesk';transition:.15s}
.subtabs button.on{background:var(--brass);border-color:var(--brass);color:#fff}

/* cards de total por mês */
.mcard{background:linear-gradient(165deg,#ffffff,var(--surf2));border:1px solid var(--line);border-radius:16px;
  padding:15px;margin-bottom:11px;box-shadow:0 1px 2px rgba(40,50,45,.04),0 6px 16px rgba(40,50,45,.05)}
.mcard .mch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.mcard .mnm{font-family:'Space Grotesk';font-weight:700;font-size:15.5px;text-transform:capitalize;letter-spacing:-.01em}
.mcard .mnt{font-family:'Space Grotesk';font-weight:700;font-size:17px;letter-spacing:-.01em}
.mcard .mnt.pos{color:var(--pos)} .mcard .mnt.neg{color:var(--neg)} .mcard .mnt.z{color:var(--muted)}
.mcard .nmov{font-size:11px;color:var(--faint);font-weight:500;margin-left:7px}

/* casa cards */
.casas{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.casa{position:relative;overflow:hidden;background:linear-gradient(165deg,#ffffff,var(--surf2));
  border:1px solid var(--line);border-radius:16px;padding:15px 14px 13px;min-width:0;transition:.18s;
  box-shadow:0 1px 2px rgba(40,50,45,.04),0 6px 16px rgba(40,50,45,.05)}
.casa::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--cor,var(--brass));opacity:.85}
.casa:active{transform:scale(.985)}
.casa.on{box-shadow:0 1px 2px rgba(40,50,45,.05),0 8px 22px rgba(40,50,45,.10)}
.casa .top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.casa .top .cdot{width:10px;height:10px;border-radius:3px;flex:none}
.casa .top h3{font-size:13.5px;font-weight:600;margin:0;font-family:'Space Grotesk';overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.casa .rl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1px}
.casa .res{font-family:'Space Grotesk';font-weight:700;font-size:21px;letter-spacing:-.01em}
.casa .res.pos{color:var(--pos)} .casa .res.neg{color:var(--neg)} .casa .res.z{color:var(--muted)}
.casa .cfoot{display:flex;gap:12px;margin-top:9px;font-family:'IBM Plex Mono';font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.casa .cfoot .o::before{content:"↑ ";color:var(--neg)}
.casa .cfoot .i::before{content:"↓ ";color:var(--pos)}
.casa .salchip{display:block;width:100%;margin-top:11px;padding:8px 10px;border-radius:10px;
  background:var(--inset);border:1px solid var(--line);text-align:center;
  font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.casa .salchip b{font-family:'IBM Plex Mono';font-weight:600;color:var(--brass);margin-left:5px}
.casa .salchip b.empty{color:var(--faint);font-weight:400;font-family:Inter}

/* movimentos */
.month{margin-top:18px}
.month .mh{display:flex;justify-content:space-between;align-items:baseline;margin:0 2px 8px}
.month .mh .mtitle{font-family:'Space Grotesk';font-weight:600;font-size:14px;text-transform:capitalize}
.month .mh .mtot{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.mov{display:flex;align-items:center;gap:11px;background:var(--surf);border:1px solid var(--line);
  border-radius:13px;padding:11px 13px;margin-bottom:7px;transition:.12s}
.mov:active{background:var(--surf2)}
.mov .ic{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:15px;
  background:var(--inset);border:1px solid var(--line)}
.mov .ic.dep{color:var(--neg)} .mov .ic.lev{color:var(--pos)}
.mov .mid{flex:1;min-width:0}
.mov .mid .l1{display:flex;align-items:center;gap:7px}
.mov .mid .cn{font-size:13.5px;font-weight:600}
.mov .mid .cc{width:7px;height:7px;border-radius:2px;flex:none}
.mov .mid .l2{font-size:11px;color:var(--faint);margin-top:1px}
.mov .amt{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;white-space:nowrap}
.mov .amt.dep{color:var(--ivory)} .mov .amt.lev{color:var(--pos)}

.empty{text-align:center;color:var(--faint);padding:40px 20px;font-size:13.5px}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(20px + var(--safe-b));z-index:45;
  width:58px;height:58px;border-radius:19px;background:linear-gradient(150deg,var(--brass),var(--brass-dim));
  color:#1a1305;display:grid;place-items:center;font-size:28px;font-weight:300;
  box-shadow:0 10px 26px rgba(201,162,39,.34),0 2px 6px rgba(0,0,0,.4);transition:.15s}
.fab:active{transform:scale(.92)}

/* sheet / modal */
.scrim{position:fixed;inset:0;background:rgba(4,8,6,.62);backdrop-filter:blur(3px);z-index:80;
  opacity:0;pointer-events:none;transition:.2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:81;background:var(--surf);
  border-top:1px solid var(--line);border-radius:24px 24px 0 0;padding:8px 18px calc(22px + var(--safe-b));
  transform:translateY(102%);transition:transform .26s cubic-bezier(.2,.8,.2,1);max-width:560px;margin:0 auto}
.sheet.on{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.sheet h2{font-family:'Space Grotesk';font-size:18px;font-weight:700;margin:0 0 16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:.02em}
.field input,.field select{width:100%;background:var(--inset);border:1px solid var(--line);border-radius:12px;
  color:var(--ivory);font-size:15.5px;padding:13px 13px;caret-color:var(--brass);
  -webkit-appearance:none;appearance:none;min-width:0;max-width:100%;box-sizing:border-box}
.field input:focus,.field select:focus{outline:none;border-color:var(--brass)}
.row2{display:flex;gap:10px}.row2 .field{flex:1;min-width:0}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:12px;border-radius:12px;background:var(--inset);border:1px solid var(--line);
  font-weight:600;font-size:13.5px;color:var(--muted);font-family:'Space Grotesk'}
.seg button.on.dep{background:rgba(216,69,59,.12);border-color:var(--neg);color:var(--neg)}
.seg button.on.lev{background:rgba(31,157,87,.12);border-color:var(--pos);color:var(--pos)}
.casaPick{display:flex;flex-wrap:wrap;gap:8px}
.casaPick button{padding:9px 13px;border-radius:999px;background:var(--inset);border:1px solid var(--line);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.casaPick button .cd{width:9px;height:9px;border-radius:3px}
.casaPick button.on{border-color:var(--brass);background:rgba(201,162,39,.12);color:var(--ivory)}
.btnP{width:100%;padding:15px;border-radius:14px;background:linear-gradient(150deg,var(--brass),var(--brass-dim));
  color:#1a1305;font-weight:700;font-size:15px;font-family:'Space Grotesk';margin-top:6px}
.btnP:active{filter:brightness(.95)}
.btnGhost{width:100%;padding:13px;border-radius:13px;background:transparent;border:1px solid var(--line);
  color:var(--muted);font-weight:500;font-size:13.5px;margin-top:9px}
.btnDel{color:var(--neg);border-color:rgba(229,87,76,.4)}

/* login */
.login{min-height:100vh;display:grid;place-items:center;padding:30px}
.login .card{text-align:center;max-width:340px}
.login .chip-suit{width:62px;height:62px;border-radius:18px;font-size:30px;margin:0 auto 20px}
.login h1{font-family:'Space Grotesk';font-size:28px;margin:0 0 8px}
.login p{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 26px}
.gbtn{display:inline-flex;align-items:center;gap:11px;background:#fff;color:#1a1a1a;font-weight:600;
  font-size:15px;padding:13px 22px;border-radius:14px}
.note{margin-top:22px;font-size:12px;color:var(--faint);line-height:1.5}

.toast{position:fixed;left:50%;bottom:calc(94px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:#23302a;border:1px solid #2f3f37;color:#f3f0e8;padding:11px 18px;border-radius:12px;
  font-size:13.5px;z-index:90;opacity:0;transition:.2s;pointer-events:none;box-shadow:0 8px 22px rgba(40,50,45,.25)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.demoBadge{display:inline-block;margin-left:8px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--brass);border:1px solid var(--brass-dim);border-radius:6px;padding:2px 6px;vertical-align:middle;font-family:'Space Grotesk';font-weight:600}

/* ===== gráfico evolução ===== */
/* filtro secundário segmentado (por casa / por mês) — distinto das sub-tabs */
.subfilter{display:flex;gap:4px;background:var(--surf2);border:1px solid var(--line);border-radius:12px;
  padding:4px;margin:2px 0 14px;box-shadow:inset 0 1px 2px rgba(40,50,45,.04)}
.subfilter button{flex:1 1 0;min-width:0;padding:7px 4px;border-radius:9px;font-size:11px;font-weight:600;
  color:var(--muted);font-family:'Space Grotesk';display:flex;align-items:center;justify-content:center;gap:5px;
  white-space:nowrap;overflow:hidden;transition:.15s;line-height:1.1}
.subfilter button .t{overflow:hidden;text-overflow:ellipsis}
.subfilter button .cd{width:8px;height:8px;border-radius:3px;flex:none}
.subfilter button.on{background:#fff;color:var(--ivory);box-shadow:0 1px 2px rgba(40,50,45,.06),0 2px 8px rgba(40,50,45,.08)}
.chartCard{background:linear-gradient(165deg,#ffffff,var(--surf2));border:1px solid var(--line);border-radius:16px;
  padding:16px 14px 13px;box-shadow:0 1px 2px rgba(40,50,45,.04),0 6px 16px rgba(40,50,45,.05)}
.chartScroll{overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;padding-bottom:2px}
.chartScroll::-webkit-scrollbar{display:none}
.bars{display:flex;align-items:flex-end;gap:14px;min-width:100%;padding:0 2px}
.bcol{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:30px}
.bpair{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:162px;width:100%}
.bar{width:11px;border-radius:5px 5px 0 0;min-height:2px}
.bar.dep{background:linear-gradient(180deg,#e2675d,var(--neg))}
.bar.lev{background:linear-gradient(180deg,var(--pos),#2e8c47)}
.bcol .blab{font-size:10.5px;color:var(--faint);font-family:'Space Grotesk';font-weight:600;white-space:nowrap;text-transform:capitalize}

/* gráfico horizontal (meses no eixo vertical, montantes no horizontal) */
.hchart{--lblw:42px;--gap:8px;margin-top:2px}
.hplot{position:relative}
.hgrid{position:absolute;top:0;bottom:0;left:calc(var(--lblw) + var(--gap));right:0;z-index:0;pointer-events:none}
.hgrid i{position:absolute;top:0;bottom:0;width:1px;background:var(--line);opacity:.6}
.hrow{display:grid;grid-template-columns:var(--lblw) 1fr;align-items:center;gap:var(--gap);margin-bottom:8px}
.hrow .hlab{font-size:10px;color:var(--faint);text-align:right;font-family:'Space Grotesk';font-weight:600;
  white-space:nowrap;text-transform:capitalize}
.htrack{position:relative;height:20px;z-index:1}
.hbar{position:absolute;left:0;height:8px;border-radius:0 4px 4px 0;min-width:2px}
.hbar.dep{top:1px;background:linear-gradient(90deg,#e2675d,var(--neg))}
.hbar.lev{bottom:1px;background:linear-gradient(90deg,var(--pos),#2e8c47)}
.haxis{position:relative;height:13px;margin-top:4px;margin-left:calc(var(--lblw) + var(--gap))}
.haxis span{position:absolute;top:0;font-size:9px;color:var(--faint);font-family:'IBM Plex Mono';
  white-space:nowrap;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="ptr"><div class="spin"></div></div>
<div id="app"></div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>

/* ---------- época ---------- */
function epocaDe(dateStr){
  const d=new Date(dateStr+'T00:00:00'); const y=d.getFullYear();
  const after=(d.getMonth()+1>CFG.SEASON_START.m)||(d.getMonth()+1===CFG.SEASON_START.m&&d.getDate()>=CFG.SEASON_START.d);
  const ini=after?y:y-1; return ini+'/'+String(ini+1).slice(2);
}
function epocasDisponiveis(){
  const set=new Set(S.movs.map(m=>epocaDe(m.data)));
  return [...set].sort().reverse();   // mais recente primeiro
}

/* ---------- supabase ---------- */
let _tok=null,_rtok=null,_exp=0;
const SKEY='bc_session';
function saveSession(){ try{ if(_tok) localStorage.setItem(SKEY,JSON.stringify({t:_tok,r:_rtok,e:_exp})); }catch(e){} }
function loadSession(){ try{ const s=JSON.parse(localStorage.getItem(SKEY)||'null'); if(s&&s.t){_tok=s.t;_rtok=s.r||null;_exp=s.e||0;return true;} }catch(e){} return false; }
function clearSession(){ try{ localStorage.removeItem(SKEY); }catch(e){} _tok=null;_rtok=null;_exp=0; }
async function refreshSession(){
  if(!_rtok) return false;
  try{
    const r=await fetch(CFG.SB_URL+'/auth/v1/token?grant_type=refresh_token',
      {method:'POST',headers:{apikey:CFG.SB_ANON,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:_rtok})});
    if(!r.ok) throw new Error('refresh '+r.status);
    const d=await r.json();
    _tok=d.access_token; _rtok=d.refresh_token||_rtok; _exp=Date.now()+((d.expires_in||3600)*1000);
    saveSession(); return true;
  }catch(e){ clearSession(); return false; }
}
async function sbAuthHeader(){
  if(S.demo) return {};
  if(_tok && Date.now()<_exp-60000) return {Authorization:'Bearer '+_tok};
  if(_rtok && await refreshSession()) return {Authorization:'Bearer '+_tok};
  return _tok?{Authorization:'Bearer '+_tok}:{};
}
async function sb(path, {method='GET',body=null,write=false}={}){
  const h={apikey:CFG.SB_ANON,'Content-Type':'application/json'};
  Object.assign(h, await sbAuthHeader());
  h[write?'Content-Profile':'Accept-Profile']=CFG.SCHEMA;
  if(method!=='GET'&&!write) h['Accept-Profile']=CFG.SCHEMA;
  if(write) h['Prefer']='return=representation';
  const r=await fetch(CFG.SB_URL+'/rest/v1/'+path,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){const t=await r.text();throw new Error(r.status+' '+t)}
  const txt=await r.text(); return txt?JSON.parse(txt):null;
}

async function load(){

/* ---------- cálculos ---------- */
function movsFiltrados(){
  let m=S.movs;
  if(S.season!=='all') m=m.filter(x=>epocaDe(x.data)===S.season);
  if(S.filterCasa) m=m.filter(x=>x.casa===S.filterCasa);
  return m;
}
function totais(list){
  let dep=0,lev=0;
  list.forEach(m=>{ if(m.tipo==='deposito')dep+=+m.valor; else lev+=+m.valor; });
  return {dep,lev};
}
function casaStats(nome,season){
  let list=S.movs.filter(m=>m.casa===nome);
  if(season!=='all') list=list.filter(m=>epocaDe(m.data)===season);
  if(S.filterMeses.length) list=list.filter(m=>S.filterMeses.includes(m.data.slice(0,7)));
  const {dep,lev}=totais(list);
  return {dep,lev,resultado:lev-dep,nMov:list.length};
}
// meses (YYYY-MM) presentes na época atual, mais recente primeiro
function mesesDisponiveis(){
  let m=S.movs;
  if(S.season!=='all') m=m.filter(x=>epocaDe(x.data)===S.season);
  return [...new Set(m.map(x=>x.data.slice(0,7)))].sort().reverse();
}
// valores de referência "redondos" para o eixo dos montantes
function niceTicks(max,count=4){
  if(max<=0) return [0];
  const raw=max/count, mag=Math.pow(10,Math.floor(Math.log10(raw))), norm=raw/mag;
  const step=(norm<1.5?1:norm<3?2:norm<7?5:10)*mag;
  const ticks=[]; for(let v=0;v<=max+1e-9;v+=step) ticks.push(v);
  if(ticks[ticks.length-1]<max) ticks.push(ticks[ticks.length-1]+step);
  return ticks;
}
// filtro segmentado por casa (uma linha, sem scroll; toca de novo p/ limpar)
function casaFilterH(){
  return `<div class="subfilter">${S.casas.filter(c=>c.ativa!==false).map(c=>`<button class="${S.filterCasa===c.nome?'on':''}" onclick="toggleCasa('${esc(c.nome)}')"><span class="cd" style="background:${c.cor}"></span><span class="t">${esc(c.nome)}</span></button>`).join('')}</div>`;
}
// filtro segmentado por mês (multi-seleção, uma linha; mês a 2 dígitos)
function mesFilterH(){
  const keys=mesesDisponiveis();
  if(!keys.length) return '';
  return `<div class="subfilter">${keys.map(k=>`<button class="${S.filterMeses.includes(k)?'on':''}" onclick="toggleMes('${k}')">${k.slice(5)}</button>`).join('')}</div>`;
}
function mesesResumo(list){
  // agrupa por YYYY-MM e devolve {key,y,mo,dep,lev,net,n} ordenado do mais recente p/ o mais antigo
  const g={};
  list.forEach(m=>{const k=m.data.slice(0,7);(g[k]??=[]).push(m)});
  return Object.keys(g).sort().reverse().map(k=>{
    const [y,mo]=k.split('-'); const {dep,lev}=totais(g[k]);
    return {key:k,y,mo:+mo,dep,lev,net:lev-dep,n:g[k].length};
  });
}

/* ---------- importar extrato Revolut ---------- */
const REV_CASAS=[
  {kw:'betclic', casa:'betClic'},
  {kw:'betano',  casa:'Betano'},
  {kw:'placard', casa:'placard.pt'}
];
let _grp=[];   // por dia/casa/tipo: {data,casa,tipo,ext:[],extTot,bd:[],bdTot,status,replace}

function importRevolut(){
  openSheet(`<h2>Importar do Revolut</h2>
    <p style="color:var(--muted);font-size:13px;margin:-6px 0 14px">
      Na app Revolut exporta o extrato em <b>CSV</b> e escolhe aqui o ficheiro.
      Apanho só Betclic, Betano e Placard e ignoro o que já está registado.</p>
    <div class="field"><label>Ficheiro CSV</label>
      <input id="f_rev" type="file" accept=".csv,text/csv" onchange="revFile(this)"></div>
    <div id="revOut"></div>
    <button class="btnGhost" onclick="closeSheet()">Fechar</button>`);
}
function revFile(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ revParse(rd.result); }
    catch(e){ $('#revOut').innerHTML='<p style="color:var(--neg);font-size:13px">Não consegui ler: '+esc(e.message)+'</p>'; } };
  rd.readAsText(file);
}
function csvRows(txt){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<txt.length;i++){ const ch=txt[i];
    if(q){ if(ch==='"'){ if(txt[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{
      if(ch==='"')q=true;
      else if(ch===',')   {row.push(cur);cur='';}
      else if(ch==='\n')  {row.push(cur);rows.push(row);row=[];cur='';}
      else if(ch==='\r')  {}
      else cur+=ch;
    }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function revParse(txt){
  const rows=csvRows(txt).filter(r=>r.length>1);
  const out=$('#revOut');
  if(!rows.length){ out.innerHTML='<p style="color:var(--neg);font-size:13px">CSV vazio.</p>'; return; }
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const col=cands=>head.findIndex(h=>cands.some(c=>h.includes(c)));
  const iAmount=col(['montante','amount']);            // PT / EN
  const iDesc  =col(['descri','description']);
  const iStart =col(['início','inicio','started','start date']);
  const iComp  =col(['conclus','completed']);
  const iState =col(['estado','state']);
  if(iAmount<0||iDesc<0){ out.innerHTML='<p style="color:var(--neg);font-size:13px">Não parece um extrato Revolut (faltam colunas Montante/Descrição).</p>'; return; }
  // agrupa o extrato por dia/casa/tipo
  const G={};
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; if(c.length<=iAmount) continue;
    const st=(iState>=0?(c[iState]||''):'').trim().toUpperCase();
    if(st && !(st.startsWith('CONCLU')||st==='COMPLETED')) continue;   // só concluídas
    const hit=REV_CASAS.find(x=>(c[iDesc]||'').toLowerCase().includes(x.kw));
    if(!hit) continue;
    const amt=parseFloat((c[iAmount]||'').replace(/\s/g,'').replace(',','.'));
    if(!isFinite(amt)||amt===0) continue;
    const data=(((iStart>=0&&c[iStart])?c[iStart]:(iComp>=0?c[iComp]:''))).trim().slice(0,10);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(data)) continue;
    const tipo=amt<0?'deposito':'levantamento';        // saída p/ casa = depósito; entrada = levantamento
    const valor=Math.round(Math.abs(amt)*100)/100;
    const k=data+'|'+hit.casa+'|'+tipo;
    (G[k]??={data,casa:hit.casa,tipo,ext:[]}).ext.push(valor);
  }
  // reconcilia cada grupo do extrato com o que está na BD (mesmo dia/casa/tipo)
  const sum=a=>Math.round(a.reduce((s,v)=>s+v,0)*100)/100;
  const sameSet=(a,b)=>{ if(a.length!==b.length)return false;
    const s=x=>[...x].map(v=>(+v).toFixed(2)).sort(); const A=s(a),B=s(b);
    return A.every((v,i)=>v===B[i]); };
  _grp=Object.values(G).map(g=>{
    g.extTot=sum(g.ext);
    g.bd=S.movs.filter(m=>m.data===g.data&&m.casa===g.casa&&m.tipo===g.tipo).map(m=>({id:m.id,valor:+m.valor}));
    g.bdTot=sum(g.bd.map(m=>m.valor));
    if(!g.bd.length) g.status='new';                                  // nada na BD → importar
    else if(sameSet(g.ext,g.bd.map(m=>m.valor))) g.status='same';     // já igual → ignorar
    else if(Math.abs(g.extTot-g.bdTot)<0.005) g.status='auto';        // total igual → substituir
    else g.status='conflict';                                         // total difere → perguntar
    g.apply=(g.status==='new'||g.status==='auto');                    // conflitos: por defeito ficam de fora
    return g;
  }).sort((a,b)=>a.data<b.data?1:-1);
  revRender();
}
function revRender(){
  const out=$('#revOut');
  if(!_grp.length){ out.innerHTML='<p style="color:var(--muted);font-size:13px;margin:10px 0">Nenhum movimento de Betclic/Betano/Placard encontrado.</p>'; return; }
  const nSame=_grp.filter(g=>g.status==='same').length;
  const shown=_grp.filter(g=>g.status!=='same');
  const dayL=d=>{const [,mo,dd]=d.split('-');return (+dd)+' '+MESES[+mo-1];};
  const money=v=>{const s=(+v).toFixed(2).replace('.',',');return s.endsWith(',00')?s.slice(0,-3):s;};
  const lst=a=>a.length?a.map(money).join(' + '):'—';
  const TAG={new:'novo',auto:'atualizar',conflict:'conflito'};
  const TC ={new:'var(--pos)',auto:'var(--brass)',conflict:'var(--neg)'};
  const body=shown.map(g=>{ const i=_grp.indexOf(g);
    const diff=Math.abs(g.extTot-g.bdTot)>=0.005;
    return `<div class="mov" onclick="revFlip(${i})" style="${g.status==='conflict'?'border-color:rgba(229,87,76,.4)':''}">
      <div class="ic ${g.tipo==='deposito'?'dep':'lev'}">${g.tipo==='deposito'?'↑':'↓'}</div>
      <div class="mid">
        <div class="l1"><span class="cn">${esc(g.casa)}</span> · <span class="l2">${dayL(g.data)}</span>
          <span class="l2" style="color:${TC[g.status]};font-weight:600"> · ${TAG[g.status]}</span></div>
        <div class="l2">antes <b style="color:var(--muted)">${lst(g.bd.map(m=>m.valor))}</b> → depois <b style="color:var(--ivory)">${lst(g.ext)}</b>${diff?` <span style="color:var(--neg)">(Σ ${money(g.bdTot)}≠${money(g.extTot)} €)</span>`:''}</div>
      </div>
      <div style="margin-left:8px;font-size:17px;color:${g.apply?'var(--brass)':'var(--faint)'}">${g.apply?'☑':'☐'}</div>
    </div>`; }).join('');
  const nApply=_grp.filter(g=>g.apply&&g.status!=='same').length;
  out.innerHTML=`<p style="color:var(--muted);font-size:12.5px;margin:12px 2px 10px">
      ${shown.length} alteração(ões) · ${nSame} já igual(is). Toca para incluir/excluir.</p>
    <div style="max-height:48vh;overflow:auto;margin-bottom:12px">${body}</div>
    <button class="btnP" onclick="revApply()" ${nApply?'':'disabled style="opacity:.5"'}>Aplicar (${nApply})</button>`;
}
function revFlip(i){ if(_grp[i].status!=='same'){_grp[i].apply=!_grp[i].apply; revRender();} }
async function revApply(){
  const todo=_grp.filter(g=>g.apply&&g.status!=='same');
  if(!todo.length) return toast('Nada a aplicar');
  let ins=0,del=0,fail=0,nid=nextId();
  for(const g of todo){
    if(g.status!=='new'){                                  // apaga o que está na BD nesse dia/casa/tipo
      for(const m of g.bd){
        try{ if(S.demo){S.movs=S.movs.filter(x=>x.id!==m.id);} else await sb('movimentos?id=eq.'+m.id,{method:'DELETE',write:true}); del++; }
        catch(e){ fail++; }
      }
    }
    for(const v of g.ext){
      const rec={data:g.data,casa:g.casa,tipo:g.tipo,valor:v,nota:'Revolut'};
      try{ const id=nid++; if(S.demo){S.movs.push({id,...rec});} else await sb('movimentos',{method:'POST',body:{id,...rec},write:true}); ins++; }
      catch(e){ fail++; }
    }
  }
  toast(`+${ins} inseridos · ${del} apagados${fail?' · '+fail+' erros':''}`);
  closeSheet(); if(!S.demo) await load(); render();
}

async function fetchUser(){
  try{
    let r=await fetch(CFG.SB_URL+'/auth/v1/user',{headers:{apikey:CFG.SB_ANON,Authorization:'Bearer '+_tok}});
    if(r.status===401 && await refreshSession())
      r=await fetch(CFG.SB_URL+'/auth/v1/user',{headers:{apikey:CFG.SB_ANON,Authorization:'Bearer '+_tok}});
    if(!r.ok) throw new Error('user '+r.status);
    const u=await r.json();
    if(u.email!==CFG.ADMIN_EMAIL){alert('Sem acesso a esta conta.');logout();return;}
    S.user={email:u.email,avatar:u.user_metadata?.avatar_url};
  }catch(e){ clearSession(); }
}

/* ---------- pull to refresh ---------- */
let startY=0,pulling=false;
addEventListener('touchstart',e=>{if(scrollY<=0){startY=e.touches[0].clientY;pulling=true}},{passive:true});
addEventListener('touchmove',e=>{
  if(!pulling)return; const dy=e.touches[0].clientY-startY;
  if(dy>0&&scrollY<=0){const h=Math.min(dy*.5,70);$('#ptr').style.height=h+'px';$('#ptr').classList.toggle('pull',h>10)}
},{passive:true});
addEventListener('touchend',async()=>{
  if(!pulling)return; pulling=false; const ptr=$('#ptr');
  if(parseInt(ptr.style.height)>45){ptr.classList.add('go');ptr.style.height='44px';
    try{await load()}catch(e){} render(); setTimeout(()=>{ptr.classList.remove('go','pull');ptr.style.height='0'},400);
  }else{ptr.classList.remove('pull');ptr.style.height='0'}
});

/* ---------- arranque ---------- */
(async function init(){
  if(!S.demo){
    if(parseAuthHash()){ await fetchUser(); }
    else if(loadSession()){
      if(Date.now()>=_exp-60000) await refreshSession();
      if(_tok) await fetchUser();
    }
    if(!S.user) renderLogin();
  }
  try{ if(S.demo||S.user){ await load(); applySeasonDefault(); applyViewDefaults(); } }catch(e){ console.error(e); }
  render();
})();

/* ao voltar à app (switch de app), refresca os dados mantendo o separador */
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState!=='visible' || !(S.demo||S.user)) return;
  try{ await load(); }catch(e){}
  render();
});

/* ---------- service worker ---------- */
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
